<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>API Test</h1>
    <button onclick="testAPI()">Test API</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                // Test the main endpoint
                const response = await fetch('https://rassen-production-8752.up.railway.app/');
                const text = await response.text();
                resultDiv.innerHTML = `<p><strong>Main endpoint:</strong> ${response.status} - ${text}</p>`;
                
                // Test dashboard endpoint
                const dashboardResponse = await fetch('https://rassen-production-8752.up.railway.app/api/dashboard/summary');
                resultDiv.innerHTML += `<p><strong>Dashboard endpoint:</strong> ${dashboardResponse.status} - ${dashboardResponse.statusText}</p>`;
                
                // Test auth endpoint
                const authResponse = await fetch('https://rassen-production-8752.up.railway.app/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'test', password: 'test' })
                });
                resultDiv.innerHTML += `<p><strong>Auth endpoint:</strong> ${authResponse.status} - ${authResponse.statusText}</p>`;
                
            } catch (error) {
                resultDiv.innerHTML = `<p><strong>Error:</strong> ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
